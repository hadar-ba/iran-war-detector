name: Pattern Detector

on:
  schedule:
    - cron: "0 0,12 * * *"   # twice daily at 00:00 and 12:00 UTC
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # needed to commit reports/latest.md and data/results/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          PYTHONUTF8: "1"
        run: python src/main.py
        # Exit code 2 means a warning was triggered; treat as success for CI
        # (the warning is surfaced in reports/latest.md)
        continue-on-error: false

      - name: Commit report and results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/latest.md data/results/
          git diff --cached --quiet || git commit -m "chore: analysis run $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
