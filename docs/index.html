<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iran-Israel Conflict Pattern Detector</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --blue: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
  header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { color: var(--muted); font-size: 12px; }
  .run-time { margin-left: auto; color: var(--muted); font-size: 12px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Status banner */
  .banner { border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
  .banner.normal  { background: #0d2d18; border: 1px solid var(--green); color: var(--green); }
  .banner.spike   { background: #2d2006; border: 1px solid var(--yellow); color: var(--yellow); }
  .banner.warning { background: #2d0d0d; border: 1px solid var(--red); color: var(--red); }
  .banner .icon { font-size: 20px; }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .card .value { font-size: 28px; font-weight: 700; }
  .card .sub   { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .card.warn   { border-color: var(--red); }
  .card.spike  { border-color: var(--yellow); }

  /* Similarity table */
  .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; margin-top: 28px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th { background: #1c2128; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; padding: 8px 14px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 9px 14px; border-bottom: 1px solid #21262d; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr.warn-row td { background: #1a0d0d; }

  /* Score bar */
  .score-cell { display: flex; align-items: center; gap: 10px; }
  .score-bar-bg { flex: 1; height: 6px; background: #21262d; border-radius: 3px; }
  .score-bar    { height: 6px; border-radius: 3px; transition: width .3s; }
  .score-num    { width: 44px; text-align: right; font-weight: 600; font-size: 13px; }

  /* Chart */
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 14px; position: relative; height: 220px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid var(--border); }
  .tab  { padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.pre  { background: #2d1010; color: var(--red); }
  .badge.post { background: #0d2020; color: #39c5bb; }
  .badge.quiet{ background: #1a1a2d; color: #8b8bdb; }

  #loading { text-align: center; padding: 60px; color: var(--muted); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>Iran-Israel Conflict Pattern Detector</h1>
    <div class="subtitle">Quantitative similarity to historical pre-conflict periods · Not a prediction</div>
  </div>
  <div class="run-time" id="run-time">Loading…</div>
</header>

<main id="loading">Loading latest data…</main>

<script>
// ---------------------------------------------------------------------------
// Config — update REPO to your GitHub username/repo (used as fallback only)
// ---------------------------------------------------------------------------
const REPO   = "hadar-ba/iran-war-detector";
const BRANCH = "main";
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

// On GitHub Pages the site is served from /docs but data lives at repo root.
// We probe relative paths first; if that 404s, fall back to raw.githubusercontent.
const isGHPages = location.hostname.endsWith("github.io");
const DATA_BASE = isGHPages
  ? `https://raw.githubusercontent.com/${REPO}/${BRANCH}`
  : "..";   // local dev: repo root is one level above docs/

const WARN_THRESHOLD = 0.70;
const TYPE_LABELS = { "pre-round": "PRE", "post-ceasefire": "POST", "quiet": "QUIET" };
const COLORS = {
  "pre-round":     "#f85149",
  "post-ceasefire":"#39c5bb",
  "quiet":         "#8b8bdb",
};

// ---------------------------------------------------------------------------
// Fetch helpers
// ---------------------------------------------------------------------------
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${url}`);
  return r.json();
}

function resultCandidates(maxHours, stepHours = 1) {
  const pad = n => String(n).padStart(2, "0");
  const now = new Date();
  const out = [];
  for (let h = 0; h <= maxHours; h += stepHours) {
    const d = new Date(now - h * 3600000);
    out.push(`${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}_${pad(d.getUTCHours())}`);
  }
  return out;
}

async function getLatestResult() {
  for (const fname of resultCandidates(48)) {
    try {
      const data = await fetchJSON(`${DATA_BASE}/data/results/${fname}.json`);
      return { fname, data };
    } catch { /* try next */ }
  }
  throw new Error("No result files found in the last 48h");
}

async function getHistory() {
  const results = [];
  for (const fname of resultCandidates(30 * 24, 12)) {
    try {
      const data = await fetchJSON(`${DATA_BASE}/data/results/${fname}.json`);
      results.push({ fname, data });
      if (results.length >= 20) break;
    } catch { /* missing, skip */ }
  }
  return results.reverse();
}

// ---------------------------------------------------------------------------
// Score color
// ---------------------------------------------------------------------------
function scoreColor(score) {
  if (score >= WARN_THRESHOLD)  return "#f85149";
  if (score >= 0.50)            return "#d29922";
  return "#3fb950";
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function renderBanner(maxPre21, maxPre7) {
  const spike = maxPre7 - maxPre21;
  if (maxPre21 >= WARN_THRESHOLD || maxPre7 >= WARN_THRESHOLD) {
    const score = Math.max(maxPre21, maxPre7);
    return `<div class="banner warning"><span class="icon">⚠️</span>WARNING — ${(score*100).toFixed(0)}% similarity to pre-conflict pattern</div>`;
  }
  if (spike > 0.10) {
    return `<div class="banner spike"><span class="icon">⚡</span>SHORT-WINDOW SPIKE — 7-day pre-similarity (${(maxPre7*100).toFixed(0)}%) is ${(spike*100).toFixed(0)}% above 21-day (${(maxPre21*100).toFixed(0)}%)</div>`;
  }
  return `<div class="banner normal"><span class="icon">✅</span>Normal — Max pre-round similarity: 21d ${(maxPre21*100).toFixed(0)}% · 7d ${(maxPre7*100).toFixed(0)}% (threshold ${(WARN_THRESHOLD*100).toFixed(0)}%)</div>`;
}

function renderCards(vec21, vec7, sims21, sims7) {
  const maxPre21 = Math.max(...sims21.filter(s=>s.is_pre_round).map(s=>s.composite_score), 0);
  const maxPre7  = Math.max(...sims7.filter(s=>s.is_pre_round).map(s=>s.composite_score), 0);
  const spike    = maxPre7 - maxPre21;

  const cardClass = score => score >= WARN_THRESHOLD ? "warn" : spike > 0.10 ? "spike" : "";
  const c21 = cardClass(maxPre21), c7 = cardClass(maxPre7);

  return `<div class="cards">
    <div class="card ${c21}">
      <div class="label">21-Day Pre-Similarity</div>
      <div class="value" style="color:${scoreColor(maxPre21)}">${(maxPre21*100).toFixed(0)}%</div>
      <div class="sub">${vec21.days_active}/21 active days · vol ${vec21.volume_total}</div>
    </div>
    <div class="card ${c7}">
      <div class="label">7-Day Pre-Similarity</div>
      <div class="value" style="color:${scoreColor(maxPre7)}">${(maxPre7*100).toFixed(0)}%</div>
      <div class="sub">vol peak ${vec7.volume_peak?.toFixed(2) ?? '—'} · spike Δ${spike>=0?"+":""}${(spike*100).toFixed(0)}%</div>
    </div>
    <div class="card">
      <div class="label">Volume Intensity (21d)</div>
      <div class="value">${vec21.volume_total?.toFixed(1) ?? '—'}</div>
      <div class="sub">daily mean ${vec21.volume_mean_daily?.toFixed(2) ?? '—'} · peak ${vec21.volume_peak?.toFixed(2) ?? '—'}</div>
    </div>
    <div class="card">
      <div class="label">Articles Sampled (7d)</div>
      <div class="value">${(vec7.articles_en||0)+(vec7.articles_he||0)+(vec7.articles_fa||0)}</div>
      <div class="sub">EN ${vec7.articles_en||0} · HE ${vec7.articles_he||0} · FA ${vec7.articles_fa||0}</div>
    </div>
  </div>`;
}

function renderTable(sims, label) {
  const rows = sims.map(s => {
    const pct   = (s.composite_score * 100).toFixed(0);
    const color = scoreColor(s.composite_score);
    const warn  = s.warn ? "warn-row" : "";
    const badge = TYPE_LABELS[s.reference_type] || s.reference_type;
    const bclass= s.reference_type === "pre-round" ? "pre" : s.reference_type === "post-ceasefire" ? "post" : "quiet";
    return `<tr class="${warn}">
      <td><strong>${s.reference_id}</strong>${s.warn ? " 🚨" : ""}</td>
      <td><span class="badge ${bclass}">${badge}</span></td>
      <td><div class="score-cell">
        <div class="score-bar-bg"><div class="score-bar" style="width:${pct}%;background:${color}"></div></div>
        <div class="score-num" style="color:${color}">${pct}%</div>
      </div></td>
      <td>${_pct(s.sub_scores?.raw_volume)}</td>
      <td>${_pct(s.sub_scores?.confluence)}</td>
      <td>${_pct(s.sub_scores?.cross_lang_correlation)}</td>
      <td>${_pct(s.sub_scores?.source_diversity)}</td>
      <td>${_pct(s.sub_scores?.tone)}</td>
    </tr>`;
  }).join("");
  return `<div class="section-title">${label}</div>
  <table>
    <thead><tr><th>Reference</th><th>Type</th><th>Score</th><th>Volume</th><th>Confluence</th><th>Lang Balance</th><th>Diversity</th><th>Tone</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function _pct(v) { return v == null ? "—" : `${(v*100).toFixed(0)}%`; }

function renderChart(history, canvasId) {
  const labels = history.map(h => h.fname.replace(/_\d+$/, ""));
  const pre21  = history.map(h => {
    const sims = h.data.window_21d?.similarities ?? h.data.similarities ?? [];
    return Math.max(...sims.filter(s=>s.is_pre_round).map(s=>s.composite_score), 0) * 100;
  });
  const pre7   = history.map(h => {
    const sims = h.data.window_7d?.similarities ?? [];
    return Math.max(...sims.filter(s=>s.is_pre_round).map(s=>s.composite_score), 0) * 100;
  });

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "21d pre-similarity", data: pre21, borderColor: "#58a6ff", backgroundColor: "rgba(88,166,255,.1)", tension: .3, fill: true, pointRadius: 3 },
        { label: "7d pre-similarity",  data: pre7,  borderColor: "#f0883e", backgroundColor: "rgba(240,136,62,.08)", tension: .3, fill: true, pointRadius: 3 },
        { label: "Threshold (70%)",    data: labels.map(()=>70), borderColor: "#f85149", borderDash: [4,4], pointRadius: 0, fill: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#8b949e", font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: "#8b949e", font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: "#21262d" } },
        y: { min: 0, max: 100, ticks: { color: "#8b949e", font: { size: 10 }, callback: v => v+"%" }, grid: { color: "#21262d" } }
      }
    }
  });
}

// ---------------------------------------------------------------------------
// Main
// ---------------------------------------------------------------------------
async function main() {
  try {
    const [latest, history] = await Promise.all([getLatestResult(), getHistory()]);
    const { fname, data } = latest;

    // Support both old format (single window) and new (dual window)
    const sims21 = data.window_21d?.similarities ?? data.similarities ?? [];
    const sims7  = data.window_7d?.similarities  ?? [];
    const vec21  = data.window_21d?.current ?? data.current_period ?? {};
    const vec7   = data.window_7d?.current  ?? {};
    const runAt  = data.run_at ?? "";

    const maxPre21 = Math.max(...sims21.filter(s=>s.is_pre_round).map(s=>s.composite_score), 0);
    const maxPre7  = Math.max(...sims7.filter(s=>s.is_pre_round).map(s=>s.composite_score), 0);

    document.getElementById("run-time").textContent = `Last run: ${runAt.slice(0,16).replace("T"," ")} UTC · ${fname}`;

    document.getElementById("loading").style.display = "none";

    const el = document.createElement("div");
    el.id = "app";
    el.innerHTML = `
      ${renderBanner(maxPre21, maxPre7)}
      ${renderCards(vec21, vec7, sims21, sims7)}
      <div class="two-col">
        ${renderTable(sims21, "21-Day Window — Similarity to Reference Periods")}
        ${renderTable(sims7.length ? sims7 : sims21, sims7.length ? "7-Day Window — Similarity to Reference Periods" : "7-Day Window (no data yet)")}
      </div>
      <div class="section-title" style="margin-top:28px">Pre-Similarity Trend</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      <p style="color:var(--muted);font-size:11px;margin-top:12px;text-align:center">
        Similarity score ≠ prediction. Reference vectors may be partial during initial data collection period.
      </p>
    `;
    document.querySelector("main").replaceWith(el);

    renderChart(history.length ? history : [latest], "trendChart");

  } catch (err) {
    document.getElementById("loading").innerHTML =
      `<p style="color:#f85149">Error loading data: ${err.message}</p>
       <p style="color:#8b949e;font-size:12px;margin-top:8px">Make sure the repo is public and GitHub Pages is enabled.</p>`;
  }
}

main();
</script>
</body>
</html>
