<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מדד אזהרה: איראן–ישראל</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <span class="site-name" id="site-name"></span>
    <button class="lang-btn" id="lang-toggle"></button>
  </header>

  <main>
    <div id="loading" class="loading-screen">
      <div class="spinner"></div>
    </div>

    <div id="content" hidden>

      <!-- 5.2 Gauge — hero, fills first screen -->
      <section class="gauge-section">
        <p class="status-label" id="status-label"></p>
        <div class="gauge-circle" id="gauge-circle"></div>
        <p class="status-word" id="status-word"></p>
        <p class="score-number" id="score-number"></p>
        <p class="headline-sentence" id="headline-sentence"></p>
        <p class="updated-at" id="updated-at"></p>
      </section>

      <!-- 5.3 Trend strip -->
      <section class="trend-section">
        <p class="trend-caption" id="trend-caption"></p>
        <div class="chart-wrap">
          <canvas id="trend-chart"></canvas>
          <p id="no-chart" class="no-chart" hidden></p>
        </div>
      </section>

      <!-- 5.4 Signals -->
      <section class="signals-section" id="signals-section">
        <div id="signals-list"></div>
      </section>

      <!-- 5.5 Context paragraph -->
      <section class="context-section">
        <p class="context-text" id="context-text"></p>
      </section>

      <!-- 5.6 How it works -->
      <details class="expandable">
        <summary id="how-summary"></summary>
        <div class="expandable-body" id="how-body"></div>
      </details>

      <!-- 5.7 Sources -->
      <details class="expandable">
        <summary id="sources-summary"></summary>
        <div class="expandable-body" id="sources-body"></div>
      </details>

    </div>
  </main>

  <footer class="site-footer">
    <a class="footer-link" id="github-link"
       href="https://github.com/hadar-ba/iran-war-detector"
       target="_blank" rel="noopener"></a>
    <span class="footer-disclaimer" id="footer-disclaimer"></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
